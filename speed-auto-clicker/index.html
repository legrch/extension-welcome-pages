<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speed Auto Clicker — Installed</title>
  <link rel="icon" href="icon128.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <script defer src="https://cloud.umami.is/script.js" data-website-id="4e1191f7-4c58-449f-82f1-370c4249376d"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #fff;
      color: #060607;
      font-family: 'Roboto', sans-serif;
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1150px;
      margin: 0 auto;
      padding: 0 40px;
    }

    h1 {
      font-size: 52px;
      font-weight: 500;
      text-align: center;
      padding: 50px 0 40px;
    }

    .step-text {
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .step-text b {
      font-weight: 700;
    }

    .step-img {
      margin-bottom: 48px;
    }

    .step-img img {
      width: 100%;
      height: auto;
      display: block;
    }

    @media (max-width: 768px) {
      .container {
        padding: 0 20px;
      }

      h1 {
        font-size: 32px;
        padding: 32px 0 28px;
      }

      .step-img {
        margin-bottom: 32px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Speed Auto Clicker Installed</h1>

    <p class="step-text">Click the <b>puzzle piece</b> (1) in the top right of your browser. Then, click the little <b>pin</b> (2) next to the extension:</p>
    <div class="step-img">
      <img src="screenshot-pin.png" alt="Step 1: Pin the extension">
    </div>

    <p class="step-text">Open the extension (3) on any page to start using <b>Speed Auto Clicker</b>:</p>
    <div class="step-img">
      <img src="screenshot-use.png" alt="Step 2: Open the extension">
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speed Auto Clicker — Uninstalled</title>
  <link rel="icon" href="icon128.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <script defer src="https://cloud.umami.is/script.js" data-website-id="4e1191f7-4c58-449f-82f1-370c4249376d"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #fff;
      color: #060607;
      font-family: 'Roboto', sans-serif;
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 60px 40px;
      text-align: center;
    }

    h1 {
      font-size: 36px;
      font-weight: 500;
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: 18px;
      color: #6b7280;
      margin-bottom: 40px;
    }

    .form-wrapper {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
    }

    .form-wrapper iframe {
      width: 100%;
      height: 600px;
      border: none;
    }

    @media (max-width: 768px) {
      .container {
        padding: 40px 20px;
      }

      h1 {
        font-size: 28px;
      }

      .form-wrapper iframe {
        height: 500px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>We're sorry to see you go</h1>
    <p class="subtitle">Help us improve by filling out this 1-minute survey.</p>

    <div class="form-wrapper">
      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSeP8Ji-N2YS6JyMCt0bKK_B7swKI_Zmp8ZTtMILbcHA2paETw/viewform?embedded=true" title="Feedback survey">Loading…</iframe>
    </div>
  </div>
</body>
</html>
